server:
  port: 8081

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: authentication-service
              uri: lb://AUTHENTICATION-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/products/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
